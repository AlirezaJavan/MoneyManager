name: Release

on:
  push:
    branches:
      - master
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Version name (e.g. v1.0.0)'
        required: true
        default: 'v1.0.0'

jobs:
  check:
    name: Check release conditions
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      version_name: ${{ steps.check.outputs.version_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Evaluate trigger
        id: check
        run: |
          EVENT="${{ github.event_name }}"
          REF_TYPE="${{ github.ref_type }}"

          if [ "$EVENT" = "push" ] && [ "$REF_TYPE" = "branch" ]; then
            OLD=$(git show HEAD~1:app/build.gradle.kts | grep -oP 'versionCode = \K\d+' || echo "0")
            NEW=$(grep -oP 'versionCode = \K\d+' app/build.gradle.kts)
            if [ "$OLD" != "$NEW" ]; then
              VERSION=$(grep -oP 'versionName = "\K[^"]+' app/build.gradle.kts)
              echo "should_release=true" >> $GITHUB_OUTPUT
              echo "version_name=v${VERSION}" >> $GITHUB_OUTPUT
            else
              echo "should_release=false" >> $GITHUB_OUTPUT
              echo "version_name=" >> $GITHUB_OUTPUT
            fi
          elif [ "$EVENT" = "push" ] && [ "$REF_TYPE" = "tag" ]; then
            echo "should_release=true" >> $GITHUB_OUTPUT
            echo "version_name=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "should_release=true" >> $GITHUB_OUTPUT
            echo "version_name=${{ github.event.inputs.version_name }}" >> $GITHUB_OUTPUT
          fi

  release:
    name: Build & Release
    needs: check
    if: needs.check.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Decode keystore
        run: echo "${{ secrets.SIGNING_KEY }}" | base64 -d > money-manager-key

      - name: Build release APK & AAB
        env:
          SIGNING_STORE_PATH: ${{ github.workspace }}/money-manager-key
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: ./gradlew assembleRelease bundleRelease --stacktrace

      - name: Rename artifacts
        run: |
          VERSION="${{ needs.check.outputs.version_name }}"
          mv app/build/outputs/apk/release/app-release.apk \
             app/build/outputs/apk/release/money-manager-${VERSION}.apk
          mv app/build/outputs/bundle/release/app-release.aab \
             app/build/outputs/bundle/release/money-manager-${VERSION}.aab

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.check.outputs.version_name }}
          name: Money Manager ${{ needs.check.outputs.version_name }}
          generate_release_notes: true
          files: |
            app/build/outputs/apk/release/money-manager-${{ needs.check.outputs.version_name }}.apk
            app/build/outputs/bundle/release/money-manager-${{ needs.check.outputs.version_name }}.aab
