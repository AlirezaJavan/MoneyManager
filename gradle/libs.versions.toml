activityCompose = "1.13.0"
hilt = "2.60"
hiltNavigationCompose = "1.3.0"
androidxHilt = "1.3.0"
# Navigation 3 (alpha — bump when syncing if needed)
navigation3 = "1.1.3"
lifecycleViewmodelNav3 = "2.11.0"
junit = "4.13.2"
androidxJunit = "1.3.0"
espresso = "3.7.0"
ksp = "2.3.4"
room = "2.8.4"
splashscreen = "1.2.0"
datastore = "1.2.1"
workManager = "2.11.2"
securityCrypto = "1.1.0"
biometric = "1.1.0"
glance = "1.1.1"
vico = "3.2.3"
